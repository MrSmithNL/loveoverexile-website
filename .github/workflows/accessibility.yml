# Accessibility scanning with pa11y-ci + axe
# Catches ~57% of WCAG issues automatically. Manual review needed quarterly.
name: Accessibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  accessibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      # pa11y-ci is used via npx — add as devDependency if you want to pin the version:
      # cd site && npm install --save-dev pa11y-ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Start preview server
        working-directory: site
        run: npx astro preview --host 0.0.0.0 &

      - name: Wait for server
        run: sleep 5

      - name: Run accessibility scan
        working-directory: site
        run: npx pa11y-ci
